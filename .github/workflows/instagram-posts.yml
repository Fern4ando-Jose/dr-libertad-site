name: Instagram — publicar posts (ES + PT)

# Agendamento gratuito via GitHub Actions (substitui os crons do Vercel).
# 2 CARROSSÉIS/dia (runs 4 e 5 — tópicos distintos dos Reels, que usam 0..3).
# UM workflow publica as DUAS contas (ES @dr.liberdad + PT @dr.liberdade.br) na MESMA
# tanda: ES primeiro (gera+cacheia a ilustração) e PT logo depois (reusa o cache da
# MESMA vaga → mesmo desenho, custo marginal). Antes eram 2 workflows espelhados que
# DIVERGIAM (o -pt nasceu de branch antiga e atrasava melhorias → bug do áudio PT etc.);
# fundir mata o drift de vez (regra do dono: "um publica → o outro publica").
# run é derivado da EXPRESSÃO cron que disparou (github.event.schedule), NÃO do relógio.
on:
  schedule:
    - cron: "17 12 * * *" # 09:17 BRT (run 4)
    - cron: "17 17 * * *" # 14:17 BRT (run 5)
  workflow_dispatch:
    inputs:
      run:
        description: "Run específico 0..5 p/ backfill de um horário. Vazio = usa slot/topic."
        required: false
        default: ""
      slot:
        description: "Slot a publicar (manha | tarde | noite). Vazio = publica os 3."
        required: false
        default: ""
      topic:
        description: "Forçar um tópico específico (override). Vazio = tópico do dia. Use com 1 slot p/ não publicar 3x."
        required: false
        default: ""
      force:
        description: "Ignorar a trava anti-duplicata de 24h (republicar/backfill). ⚠️ force NÃO pareia ES+PT."
        type: boolean
        required: false
        default: false

concurrency:
  group: instagram-posts
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Determinar parâmetros pelo horário
        id: params
        env:
          EVENT: ${{ github.event_name }}
          SCHEDULE: ${{ github.event.schedule }}
          IN_RUN: ${{ github.event.inputs.run }}
          IN_SLOT: ${{ github.event.inputs.slot }}
          IN_TOPIC: ${{ github.event.inputs.topic }}
          IN_FORCE: ${{ github.event.inputs.force }}
        run: |
          if [ "$EVENT" = "workflow_dispatch" ]; then
            # Disparo manual: run/slot/topic/force conforme informado.
            # (run vazio + slot vazio = 3 slots base; run preenchido = backfill de 1 horário.)
            echo "run=$IN_RUN" >> "$GITHUB_OUTPUT"
            echo "slot=$IN_SLOT" >> "$GITHUB_OUTPUT"
            echo "topic=$IN_TOPIC" >> "$GITHUB_OUTPUT"
            echo "force=$IN_FORCE" >> "$GITHUB_OUTPUT"
          else
            # Agendado: run derivado da EXPRESSÃO cron que disparou (github.event.schedule),
            # não da hora real — assim o atraso/adianto do cron não colide com o run vizinho.
            case "$SCHEDULE" in
              "17 12 * * *") RUN=4 ;;
              "17 17 * * *") RUN=5 ;;
              *) RUN=4 ;;  # fallback defensivo
            esac
            echo "run=$RUN" >> "$GITHUB_OUTPUT"
            echo "slot=" >> "$GITHUB_OUTPUT"
            echo "topic=" >> "$GITHUB_OUTPUT"
            echo "force=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publicar a vaga nas 2 contas (ES → PT)
        env:
          AUTH: ${{ secrets.CRON_SECRET }}
          SITE: ${{ secrets.SITE_URL }}
          RUN: ${{ steps.params.outputs.run }}
          SLOT: ${{ steps.params.outputs.slot }}
          TOPIC: ${{ steps.params.outputs.topic }}
          FORCE: ${{ steps.params.outputs.force }}
        run: |
          set -uo pipefail
          # Publica UM idioma. Devolve 1 se HTTP>=400 ou falha de conexão (000).
          publish_lang() {
            label="$1"; url="$2"
            ARGS=(-sS -o "resp-$label.json" -w "%{http_code}" -G)
            ARGS+=(-H "Authorization: Bearer $AUTH")
            [ -n "$RUN" ]   && ARGS+=(--data-urlencode "run=$RUN")
            [ -n "$SLOT" ]  && ARGS+=(--data-urlencode "slot=$SLOT")
            [ -n "$TOPIC" ] && ARGS+=(--data-urlencode "topic=$TOPIC")
            [ "$FORCE" = "true" ] && ARGS+=(--data-urlencode "force=1")
            echo "── [$label] run='${RUN}' slot='${SLOT}' topic='${TOPIC}' force='${FORCE}'"
            code=$(curl "${ARGS[@]}" "$url")   # -w escreve o http_code; conn-fail = 000
            [ -z "$code" ] && code="000"
            echo "[$label] HTTP $code"
            echo "--- resposta [$label] ---"; cat "resp-$label.json" 2>/dev/null; echo ""
            case "$code" in
              2*|3*) return 0 ;;   # 2xx/3xx = a API tratou a vaga (publicou/pulou por idempotência)
              *)     return 1 ;;   # 000/4xx/5xx (inclui 402 de orçamento) = falha → catch-up redispara
            esac
          }
          FAILED=0
          # ES primeiro: gera e cacheia a ilustração da vaga. PT logo depois reusa o
          # cache (mesma vaga, mesmo desenho) → só a copy muda, custo marginal.
          publish_lang "ES" "$SITE/api/publish"         || FAILED=1
          publish_lang "PT" "$SITE/api/publish?lang=pt" || FAILED=1
          if [ "$FAILED" = "1" ]; then
            echo "::error::Ao menos um idioma falhou (HTTP>=400) — o catch-up redispara a vaga (o que já saiu é deduplicado)."
            exit 1
          fi
          echo "Carrossel ES+PT da vaga publicado."
