name: Instagram — publicar posts

# Agendamento gratuito via GitHub Actions (substitui os crons do Vercel).
# 6 publicações/dia, cada uma com um tópico DISTINTO (run=0..5 derivado da hora UTC).
#   00:00 UTC = 21:00 BRT (noite anterior) · 12:00 UTC = 09:00 BRT
# run = hora/4 (0..5); o slot/tom (manha/tarde/noite) = run % 3.
on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 4 * * *"
    - cron: "0 8 * * *"
    - cron: "0 12 * * *"
    - cron: "0 16 * * *"
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      slot:
        description: "Slot a publicar (manha | tarde | noite). Vazio = publica os 3."
        required: false
        default: ""

concurrency:
  group: instagram-posts
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Determinar parâmetros pelo horário
        id: params
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Disparo manual: respeita o slot informado; vazio = publica os 3 slots base.
            if [ -n "${{ github.event.inputs.slot }}" ]; then
              echo "query=slot=${{ github.event.inputs.slot }}" >> "$GITHUB_OUTPUT"
            else
              echo "query=" >> "$GITHUB_OUTPUT"
            fi
          else
            # Agendado: run = hora/4 → 0..5 (00,04,08,12,16,20 UTC). 6 tópicos DISTINTOS/dia.
            HOUR=$(date -u +%H)
            RUN=$(( 10#$HOUR / 4 ))
            echo "query=run=$RUN" >> "$GITHUB_OUTPUT"
          fi

      - name: Chamar endpoint de publicação
        run: |
          Q="${{ steps.params.outputs.query }}"
          echo "Publicando: ${Q:-todos os slots}"
          HTTP_CODE=$(curl -sS -o response.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SITE_URL }}/api/publish?${Q}")
          echo "HTTP $HTTP_CODE"
          echo "--- resposta ---"
          cat response.json
          echo ""
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Falha na publicação (HTTP $HTTP_CODE)"
            exit 1
          fi
