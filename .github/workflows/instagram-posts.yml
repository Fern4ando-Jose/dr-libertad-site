name: Instagram — publicar posts

# Agendamento gratuito via GitHub Actions (substitui os crons do Vercel).
# 6 publicações/dia espalhadas. Os horários são em UTC.
#   00:00 UTC = 21:00 BRT (noite anterior) · 12:00 UTC = 09:00 BRT
# O slot (manha/tarde/noite) é derivado da hora UTC em que o workflow roda.
on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 4 * * *"
    - cron: "0 8 * * *"
    - cron: "0 12 * * *"
    - cron: "0 16 * * *"
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      slot:
        description: "Slot a publicar (manha | tarde | noite). Vazio = publica os 3."
        required: false
        default: ""

concurrency:
  group: instagram-posts
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Determinar slot pelo horário
        id: slot
        run: |
          if [ -n "${{ github.event.inputs.slot }}" ]; then
            echo "value=${{ github.event.inputs.slot }}" >> "$GITHUB_OUTPUT"
          else
            HOUR=$(date -u +%H)
            # 00/12 -> manha · 04/16 -> tarde · 08/20 -> noite
            IDX=$(( (10#$HOUR / 4) % 3 ))
            case $IDX in
              0) SLOT=manha ;;
              1) SLOT=tarde ;;
              2) SLOT=noite ;;
            esac
            echo "value=$SLOT" >> "$GITHUB_OUTPUT"
          fi

      - name: Chamar endpoint de publicação
        run: |
          SLOT="${{ steps.slot.outputs.value }}"
          echo "Publicando slot: ${SLOT:-todos}"
          HTTP_CODE=$(curl -sS -o response.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SITE_URL }}/api/publish?slot=${SLOT}")
          echo "HTTP $HTTP_CODE"
          echo "--- resposta ---"
          cat response.json
          echo ""
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Falha na publicação (HTTP $HTTP_CODE)"
            exit 1
          fi
