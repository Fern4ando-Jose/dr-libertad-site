name: Instagram Reel CLÁSSICO — Dr. Liberdade (PT-BR)

# Reel no estilo ANTIGO (slide animado sobre a ilustração da fal) — mantido como
# estava, rodando em paralelo ao motor de vídeo (footage). Foi o formato que gerou
# o melhor Reel até agora (insights), por isso preservado.
#
# 1x/dia às 22:00 UTC (19:00 BRT — slot do Reel campeão). Tópico = run 3 (distinto
# dos Reels de vídeo, que usam runs 0..2).
#
# BLINDAGEM DO 4º REEL (espelha o ES): o clássico dependia só da ilustração da fal e
# o slot das 19h não saía quando ela falhava (402/fal fora/QA reprovando). Cascata
# agora: ilustração → footage (Pexels) → pular. Com ilustração renderiza "ReelClassic"
# (slide); sem ela, vira um Reel de FOOTAGE ("Reel") — sempre sai algo.

on:
  # ✅ PT no ar (go-live 2026-06-17).
  schedule:
    # PT 5 min depois do ES p/ reusar a ilustração já cacheada (run 3).
    - cron: "22 22 * * *" # 19:22 BRT (run 3)
  workflow_dispatch:
    inputs:
      run:
        description: "Run p/ escolher o tópico (vazio = run 3)"
        required: false
        default: ""
      publish:
        description: "Publicar no Instagram? (no = só renderiza p/ preview)"
        required: false
        default: "no"
        type: choice
        options: ["no", "yes"]

concurrency:
  group: instagram-reels-classic-pt-${{ github.event.schedule || github.event.inputs.run || 'manual' }}
  cancel-in-progress: false

jobs:
  reel-classic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Instalar dependências
        run: npm install --no-audit --no-fund

      # run: 3 no agendamento; input ou 3 no disparo manual.
      - name: Determinar run
        id: params
        env:
          EVENT: ${{ github.event_name }}
          IN_RUN: ${{ github.event.inputs.run }}
        run: |
          if [ "$EVENT" = "workflow_dispatch" ]; then
            RUN="${IN_RUN:-3}"
          else
            RUN=3
          fi
          echo "run=$RUN" >> "$GITHUB_OUTPUT"
          echo "Run escolhido: $RUN"

      # Conteúdo + tentativa de ILUSTRAÇÃO (clássico usa a imagem da fal de fundo).
      # NÃO-FATAL: se o gate de orçamento / a fal derrubar (402/5xx), cai pro conteúdo
      # SEM ilustração e o slot vira um Reel de FOOTAGE — o run 3 nunca fica sem sair
      # por causa da ilustração.
      - name: Obter conteúdo (preview, tenta ilustração) e montar REEL_PROPS
        run: |
          AUTH="Authorization: Bearer ${{ secrets.CRON_SECRET }}"
          RUN="${{ steps.params.outputs.run }}"
          HTTP=$(curl -sS -o preview.json -w "%{http_code}" --max-time 200 -H "$AUTH" \
            "https://www.drlibertad.com/api/publish?preview=1&illus=1&lang=pt&run=$RUN" || echo 000)
          echo "preview (com ilustração): HTTP $HTTP"
          if [ "$HTTP" != "200" ]; then
            echo "::warning title=Clássico sem ilustração::HTTP $HTTP no preview illus=1 — caindo pra footage."
            curl -fsS --max-time 180 -H "$AUTH" \
              "https://www.drlibertad.com/api/publish?preview=1&lang=pt&run=$RUN" -o preview.json
          fi
          echo "Prévia recebida:"; cat preview.json | head -c 400; echo

          node -e '
            const fs = require("fs");
            const p = JSON.parse(fs.readFileSync("preview.json", "utf8"));
            const props = {
              title: p.title || "Dr. Libertad",
              slides: Array.isArray(p.slides) ? p.slides : [],
              accentWords: Array.isArray(p.accentWords) ? p.accentWords : [],
              cta: p.cta || "",
              kw: p.kw || "LIBERTAD",
              ed: p.ed || "000",
              topic: p.topic || "",
              img: p.illustration || undefined,
              cat: p.cat || "freedom",
              handle: p.handle || "@dr.liberdad",
              brand: p.brand || "Dr. Libertad",
              // Footage de RESERVA (quando não há ilustração): termos do Claude + clipes.
              videoQueries: Array.isArray(p.videoQueries) ? p.videoQueries : [],
              clips: Array.isArray(p.clips) && p.clips.length ? p.clips : undefined,
              // Trilha — UMA FAIXA POR TEMA via manifest.json. PT e ES compartilham os
              // MESMOS arquivos (mesmo tema = mesma faixa). (Espelha o ES.)
              music: require("./scripts/pick-music.cjs").pickMusic({ topic: p.topic, run: ${{ steps.params.outputs.run }} }) || undefined
            };
            fs.writeFileSync("caption.txt", p.caption || p.title || "");
            fs.writeFileSync("slot.txt", p.slot || "noite");
            fs.writeFileSync("topic.txt", p.topic || ""); // → publish-reel (anti-dup cross-formato)
            fs.writeFileSync("reel-props.json", JSON.stringify(props));
            console.log("REEL_PROPS (classic) montado:", JSON.stringify(props).slice(0, 280));
          '

      # Decide o fundo: ILUSTRAÇÃO presente → Reel CLÁSSICO (slide, formato campeão).
      # Sem ilustração → busca footage (Pexels, grátis) e o slot publica um Reel de
      # FOOTAGE. Sem nenhum dos dois → pula (nunca publica Reel preto; regra única em
      # scripts/reel-media.cjs). É a cascata robusta do Reel de footage no clássico.
      - name: Garantir fundo (ilustração → footage → pular)
        id: media
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          FOOTAGE_NUM_CLIPS: "5"
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          hasImg() { node -e 'const p=require("./reel-props.json"); process.exit(typeof p.img==="string"&&p.img.trim()?0:1)'; }
          hasMedia() { node -e 'process.exit(require("./scripts/reel-media.cjs").hasVisualMedia(require("./reel-props.json"))?0:1)'; }
          if hasImg; then
            echo "Ilustração presente → Reel CLÁSSICO (slide)."
            echo "composition=ReelClassic" >> "$GITHUB_OUTPUT"
            echo "has_media=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Sem ilustração — buscando footage (Pexels) p/ Reel de footage…"
          node scripts/fetch-footage.mjs --props=reel-props.json || echo "(footage falhou)"
          if hasMedia; then
            echo "Footage OK → Reel de footage (fallback do clássico)."
            echo "composition=Reel" >> "$GITHUB_OUTPUT"
            echo "has_media=1" >> "$GITHUB_OUTPUT"
          else
            echo "has_media=0" >> "$GITHUB_OUTPUT"
            echo "::warning title=Reel clássico pulado::Sem ilustração nem footage — não publicamos Reel preto."
          fi

      # Renderiza a composição escolhida (ReelClassic = slide; Reel = footage).
      - name: Renderizar Reel (Remotion)
        if: ${{ steps.media.outputs.has_media == '1' }}
        run: node scripts/render-reel.mjs --props=reel-props.json --composition=${{ steps.media.outputs.composition }}

      - name: Upload do mp4 para o Vercel Blob
        id: upload
        if: ${{ steps.media.outputs.has_media == '1' }}
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: |
          URL=$(node scripts/upload-blob.mjs)
          echo "URL do vídeo: $URL"
          echo "video_url=$URL" >> "$GITHUB_OUTPUT"

      - name: Preview (sem publicar)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish != 'yes' && steps.media.outputs.has_media == '1' }}
        run: |
          echo "::notice title=Reel clássico pronto (preview)::${{ steps.upload.outputs.video_url }}"
          echo "Preview (NÃO publicado): ${{ steps.upload.outputs.video_url }}"

      - name: Publicar Reel no Instagram
        if: ${{ (github.event_name == 'schedule' || github.event.inputs.publish == 'yes') && steps.media.outputs.has_media == '1' }}
        run: |
          RESP=$(curl -sS --max-time 280 -G \
            -w $'\nHTTP_CODE:%{http_code}' \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --data-urlencode "video=${{ steps.upload.outputs.video_url }}" \
            --data-urlencode "caption@caption.txt" \
            --data-urlencode "slot=$(cat slot.txt)" \
            --data-urlencode "run=${{ steps.params.outputs.run }}" \
            --data-urlencode "topic@topic.txt" \
            "https://www.drlibertad.com/api/publish-reel?lang=pt")
          echo "Resposta do servidor:"
          echo "$RESP"
          echo "$RESP" | grep -q '"ok":true' || { echo "::error::Publicação falhou"; exit 1; }
          echo "Reel clássico publicado."
